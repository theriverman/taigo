name: Go CI

on:
  push:
    branches: ["master", "ci-docker-test", "feature_*", "issue_*"]
    tags: ["v*"]
  pull_request:
    branches: ["master", "ci-docker-test"]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  unit_contract:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go from go.mod
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: GOWORK=off GOCACHE=/tmp/taigo-gocache go vet ./...

      - name: Unit and Contract Tests
        run: GOWORK=off GOCACHE=/tmp/taigo-gocache go test ./... -v

  live_smoke_pr:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go from go.mod
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Initialise taiga-docker submodule (master)
        run: |
          git submodule update --init --recursive
          git -C tests/taiga-docker fetch --all --depth=1 || true
          git -C tests/taiga-docker checkout master

      - name: Build Taiga stack
        run: cd tests && docker compose -f ./taiga-docker/docker-compose.yml -f docker-compose-ci-config.yml up -d

      - name: Wait for Taiga and load fixtures
        run: cd tests && ./load_initial_test_data.bash

      - name: Run live smoke subset
        run: |
          TAIGO_RUN_INTEGRATION_TESTS=1 \
          GOWORK=off GOCACHE=/tmp/taigo-gocache \
          go test ./tests/... -run 'TestSmokeCRUDMatrix/(epics|userstories|tasks)|TestAuthMatrixLive' -v

      - name: Teardown Taiga stack
        if: always()
        run: cd tests && docker compose -f ./taiga-docker/docker-compose.yml -f docker-compose-ci-config.yml down -v

  live_nightly_full:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go from go.mod
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Initialise taiga-docker submodule (v2)
        run: |
          git submodule update --init --recursive
          git -C tests/taiga-docker fetch --all --depth=1 || true
          git -C tests/taiga-docker checkout v2

      - name: Build Taiga stack
        run: cd tests && docker compose -f ./taiga-docker/docker-compose.yml -f docker-compose-ci-config.yml up -d

      - name: Wait for Taiga and load fixtures
        run: cd tests && ./load_initial_test_data.bash

      - name: Run full live matrix
        run: |
          TAIGO_RUN_INTEGRATION_TESTS=1 \
          GOWORK=off GOCACHE=/tmp/taigo-gocache \
          go test ./tests/... -v

      - name: Teardown Taiga stack
        if: always()
        run: cd tests && docker compose -f ./taiga-docker/docker-compose.yml -f docker-compose-ci-config.yml down -v

  prerelease_live_matrix:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        taiga_ref: ["master", "v2"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go from go.mod
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Initialise taiga-docker submodule (${{ matrix.taiga_ref }})
        run: |
          git submodule update --init --recursive
          git -C tests/taiga-docker fetch --all --depth=1 || true
          git -C tests/taiga-docker checkout ${{ matrix.taiga_ref }}

      - name: Build Taiga stack
        run: cd tests && docker compose -f ./taiga-docker/docker-compose.yml -f docker-compose-ci-config.yml up -d

      - name: Wait for Taiga and load fixtures
        run: cd tests && ./load_initial_test_data.bash

      - name: Run full live matrix on ${{ matrix.taiga_ref }}
        run: |
          TAIGO_RUN_INTEGRATION_TESTS=1 \
          GOWORK=off GOCACHE=/tmp/taigo-gocache \
          go test ./tests/... -v

      - name: Teardown Taiga stack
        if: always()
        run: cd tests && docker compose -f ./taiga-docker/docker-compose.yml -f docker-compose-ci-config.yml down -v
